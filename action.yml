name: 'TestGlance'
description: 'Track test suite health over time. Parse JUnit XML or CTRF JSON and send to TestGlance.'
author: 'TestGlance'
inputs:
  report-path:
    description: 'Path to the test report file (JUnit XML or CTRF JSON)'
    required: true
  api-key:
    description: 'TestGlance project API key'
    required: true
  api-url:
    description: 'TestGlance API URL'
    required: false
    default: 'https://www.testglance.dev'
  report-format:
    description: 'Report format: junit, ctrf, or auto (default: auto-detect from file extension)'
    required: false
    default: 'auto'
  test-job-name:
    description: 'Override the display name for this test job in TestGlance'
    required: false
    default: ''
  slowest-tests:
    description: 'Number of slowest tests to show in the CI summary (0 to disable)'
    required: false
    default: '10'
  send-results:
    description: 'Send parsed results to TestGlance API (set to false for dry-run testing)'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for PR comments. Use github.token or a PAT with pull-requests: write scope.'
    required: false
runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'activity'
  color: 'green'
