name: 'TestGlance'
description: 'Zero-config test reporting for GitHub Actions. Parse JUnit XML & CTRF JSON, get CI summaries with failed tests, slowest tests, suite breakdowns, Check Runs with inline annotations, and PR comments.'
author: 'TestGlance'
inputs:
  report-path:
    description: 'Path to test report file(s). Supports glob patterns (e.g., **/test-results/*.xml). When omitted, auto-detects common test report locations.'
    required: false
    default: ''
  api-key:
    description: 'TestGlance project API key'
    required: true
  api-url:
    description: 'TestGlance API URL'
    required: false
    default: 'https://www.testglance.dev'
  report-format:
    description: 'Report format: junit, ctrf, or auto (default: auto-detect from file extension)'
    required: false
    default: 'auto'
  test-job-name:
    description: 'Override the display name for this test job in TestGlance'
    required: false
    default: ''
  slowest-tests:
    description: 'Number of slowest tests to show in the CI summary (0 to disable)'
    required: false
    default: '10'
  send-results:
    description: 'Send parsed results to TestGlance API (set to false for dry-run testing)'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for PR comments. Use github.token or a PAT with pull-requests: write scope.'
    required: false
  create-check:
    description: 'Create a GitHub Check Run with test results and inline annotations (requires checks: write permission)'
    required: false
    default: 'false'
  check-name:
    description: 'Name of the GitHub Check Run'
    required: false
    default: 'Test Results'
  history:
    description: 'Enable run history tracking via Actions Cache'
    required: false
    default: 'true'
  history-limit:
    description: 'Maximum number of runs to keep in history'
    required: false
    default: '20'
runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'activity'
  color: 'green'
